<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Từ vựng Part 7 ETS</title><style>*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef4ff;color:#1f2937;line-height:1.55}.hero{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff;padding:34px 24px 28px}.hero-inner{max-width:1180px;margin:0 auto}.eyebrow{display:inline-flex;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.24);border-radius:999px;padding:8px 14px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}.hero h1{font-size:clamp(32px,5vw,54px);line-height:1.08;margin:16px 0 0;font-weight:700}.layout{max-width:1120px;margin:0 auto;padding:24px 20px 70px}.vocab-section,.answer-section{background:#fff;border:1px solid #dbeafe;border-left:7px solid #2563eb;border-radius:22px;padding:24px 28px;margin-bottom:20px;box-shadow:0 18px 40px rgba(15,23,42,.08)}.answer-section{border-left-color:#22c55e}.section-kicker{display:inline-flex;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:999px;padding:6px 11px;font-weight:700;font-size:13px;text-transform:uppercase}.vocab-section h2,.answer-section h2{font-size:clamp(24px,3vw,34px);line-height:1.15;color:#0f172a;margin:12px 0 16px;font-weight:700}.table-wrap{overflow:auto;border:1px solid #dbeafe;border-radius:16px;background:#fff}table{width:100%;border-collapse:collapse;min-width:560px}th,td{border-bottom:1px solid #e2e8f0;padding:12px 14px;text-align:left;vertical-align:top;font-size:16px}th{background:#eff6ff;color:#1d4ed8;font-weight:700}tr:last-child td{border-bottom:0}.vocab-table td:first-child{font-weight:700;color:#0f172a;width:40%}.vocab-table td:nth-child(2){color:#166534;font-weight:700}.answer-table{min-width:760px}.answer-table td:nth-child(even){text-align:center;color:#15803d;font-weight:700}.answer-table td:nth-child(odd){text-align:center;font-weight:700;color:#334155;background:#f8fafc}.float-tools{position:fixed;top:18px;right:18px;z-index:80;display:flex;flex-direction:column;gap:10px}.float-btn{width:48px;height:48px;border:none;border-radius:16px;background:#fff;color:#1d4ed8;box-shadow:0 12px 28px rgba(15,23,42,.2);cursor:pointer;display:grid;place-items:center}.float-btn svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.test-label{font-size:13px;font-weight:700}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:100;display:none;align-items:flex-start;justify-content:flex-end;padding:78px 18px 18px}.modal.show{display:flex}.panel{width:min(430px,calc(100vw - 36px));max-height:calc(100vh - 96px);overflow:auto;background:#fff;border-radius:22px;border:1px solid #dbeafe;box-shadow:0 24px 60px rgba(15,23,42,.28);padding:18px}.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.panel h3{font-size:22px;font-weight:700;margin:0;color:#0f172a}.close-btn{border:none;background:#e2e8f0;color:#0f172a;border-radius:999px;width:36px;height:36px;font-size:22px;cursor:pointer}.list-btn{display:block;width:100%;border:1px solid #dbeafe;background:#f8fafc;color:#0f172a;border-radius:14px;padding:12px 14px;margin:8px 0;text-align:left;font-weight:700;cursor:pointer}.list-btn:hover,.list-btn.active{background:#eff6ff;color:#1d4ed8;border-color:#93c5fd}@media(max-width:760px){.hero{padding:26px 16px 22px}.layout{padding:16px 12px 70px}.vocab-section,.answer-section{padding:20px 16px;border-radius:18px}.float-tools{top:12px;right:12px}.float-btn{width:44px;height:44px;border-radius:14px}th,td{font-size:15px;padding:10px}}.state-message{background:#fff;border:1px solid #dbeafe;border-left:7px solid #2563eb;border-radius:22px;padding:24px 28px;box-shadow:0 18px 40px rgba(15,23,42,.08);font-weight:700;color:#1f2937}.state-message.error{border-left-color:#ef4444;color:#991b1b}</style></head><body><header class="hero" id="top"><div class="hero-inner"><div class="eyebrow" id="eyebrow">TOEIC Reading · Test 6 · Part 7</div><h1>Từ vựng theo từng bài đọc</h1></div></header><div class="float-tools"><button class="float-btn" onclick="openPanel('toc')" title="Mục lục" aria-label="Mục lục"><svg viewBox="0 0 24 24"><path d="M8 6h13"></path><path d="M8 12h13"></path><path d="M8 18h13"></path><path d="M3 6h.01"></path><path d="M3 12h.01"></path><path d="M3 18h.01"></path></svg></button><button class="float-btn" onclick="openPanel('tests')" title="Chọn đề" aria-label="Chọn đề"><span class="test-label" id="testLabel">T6</span></button></div><main class="layout" id="content"></main><div class="modal" id="modal" onclick="backdropClose(event)"><div class="panel"><div class="panel-head"><h3 id="panelTitle">Mục lục</h3><button class="close-btn" onclick="closePanel()" type="button">×</button></div><div id="panelBody"></div></div></div><script>const DATA_URL='data/ets-part7-vocabulary.json';
let TEST_DATA={};
let currentTest='6';
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'section';}
function answerTable(pairs){let html='<div class="table-wrap"><table class="answer-table"><thead><tr><th>Câu</th><th>Đáp án</th><th>Câu</th><th>Đáp án</th><th>Câu</th><th>Đáp án</th><th>Câu</th><th>Đáp án</th></tr></thead><tbody>';for(let i=0;i<pairs.length;i+=4){html+='<tr>';for(let j=0;j<4;j++){const p=pairs[i+j]||['',''];html+='<td>'+esc(p[0])+'</td><td>'+esc(p[1])+'</td>';}html+='</tr>';}return html+'</tbody></table></div>';}
function setMessage(message,isError=false){document.getElementById('content').innerHTML='<div class="state-message '+(isError?'error':'')+'">'+esc(message)+'</div>';}
async function loadVocabularyData(){setMessage('Đang tải dữ liệu từ vựng...');try{const res=await fetch(DATA_URL,{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);TEST_DATA=await res.json();renderTest('6');}catch(err){setMessage('Không tải được file data/ets-part7-vocabulary.json. Khi chạy local, hãy mở qua Live Server hoặc đưa lên hosting/GitHub Pages.',true);console.error(err);}}
function renderTest(t){currentTest=String(t);const data=TEST_DATA[currentTest];if(!data){setMessage('Không tìm thấy dữ liệu Test '+currentTest+'.',true);return;}document.getElementById('eyebrow').textContent='TOEIC Reading · Test '+currentTest+' · Part 7';const label=document.getElementById('testLabel');if(label)label.textContent='T'+currentTest;let html='';data.sections.forEach((s,i)=>{const id='t'+currentTest+'-'+slug(s.title);html+='<section class="vocab-section" id="'+id+'"><div class="section-kicker">Bài đọc '+(i+1)+'</div><h2>'+esc(s.title)+'</h2><div class="table-wrap"><table class="vocab-table"><thead><tr><th>Từ / cụm từ</th><th>Nghĩa tiếng Việt</th></tr></thead><tbody>';s.rows.forEach(r=>html+='<tr><td>'+esc(r[0])+'</td><td>'+esc(r[1])+'</td></tr>');html+='</tbody></table></div></section>';});html+='<section class="answer-section" id="t'+currentTest+'-answer-key"><div class="section-kicker">Cuối bài</div><h2>Bảng đáp án từng câu</h2>'+answerTable(data.answers)+'</section>';document.getElementById('content').innerHTML=html;window.scrollTo({top:0,behavior:'smooth'});}
function openPanel(type){const modal=document.getElementById('modal'),title=document.getElementById('panelTitle'),body=document.getElementById('panelBody');if(!Object.keys(TEST_DATA).length){title.textContent='Thông báo';body.innerHTML='<div class="state-message error">Dữ liệu chưa tải xong.</div>';modal.classList.add('show');return;}if(type==='tests'){title.textContent='Chọn đề';body.innerHTML=Object.keys(TEST_DATA).map(t=>'<button class="list-btn '+(t===currentTest?'active':'')+'" onclick="renderTest('+t+');closePanel()" type="button">ETS 2024 Test '+t+'</button>').join('');}else{title.textContent='Mục lục';const data=TEST_DATA[currentTest];let html=data.sections.map((s,i)=>{const target='t'+currentTest+'-'+slug(s.title);return '<button class="list-btn" data-target="'+esc(target)+'" type="button">'+(i+1)+'. '+esc(s.title)+'</button>';}).join('');html+='<button class="list-btn" data-target="t'+currentTest+'-answer-key" type="button">Bảng đáp án</button>';body.innerHTML=html;body.querySelectorAll('[data-target]').forEach(btn=>btn.addEventListener('click',()=>jumpTo(btn.dataset.target)));}modal.classList.add('show');}
function closePanel(){document.getElementById('modal').classList.remove('show');}
function backdropClose(e){if(e.target.id==='modal')closePanel();}
function jumpTo(id){closePanel();setTimeout(()=>document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'}),40);}
loadVocabularyData();</script></body></html>
