<script>
function escapeHtml(str){return String(str ?? '').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}

const lessonBlocks = [
  {
    label:'PART 7 · OVERVIEW',
    title:'TOEIC Part 7 Reading: đọc để tìm chứng cứ',
    html:`<div class="content-area"><div class="big-word">Part 7</div><p>Part 7 kiểm tra khả năng đọc văn bản thực tế: email, notice, advertisement, article, chat, form, schedule, invoice, website, double/triple passages.</p><div class="intro-box reveal"><h3>Mục tiêu chính</h3><ul class="steps"><li>Không đọc lan man. Mỗi câu hỏi phải tìm được <span class="keyword">dòng chứng cứ</span>.</li><li>Nhận diện loại câu hỏi trước khi đọc sâu.</li><li>Làm từ câu dễ lấy điểm đến câu khó cần suy luận.</li><li>Với double/triple passages, luôn nối thông tin giữa các văn bản.</li></ul></div><div class="warning-box reveal">Nguyên tắc vàng: câu đúng không cần giống y chang bài đọc, nhưng phải paraphrase đúng ý từ bài đọc.</div></div>`
  },
  {
    label:'ROADMAP',

  },
  {
    label:'METHOD',
    title:'Quy trình 4 bước cho mọi câu Part 7',
    html:`<div class="content-area"><div class="formula reveal">Question type → Keyword → Evidence line → Paraphrase</div><div class="intro-box reveal"><h3>4 bước cố định</h3><ul class="steps"><li>Đọc câu hỏi trước, xác định nó hỏi gì.</li><li>Gạch keyword: tên người, ngày, số tiền, địa điểm, hành động.</li><li>Quay về bài đọc tìm vùng chứa keyword hoặc từ đồng nghĩa.</li><li>So đáp án với chứng cứ, loại bẫy sai chi tiết.</li></ul></div><div class="sample-box reveal"><div class="sample-title">Ví dụ rất ngắn</div><p><b>Text:</b> The shipment will arrive on Friday instead of Wednesday because of a supplier delay.</p><p><b>Question:</b> Why was the delivery postponed?</p><p><b>Correct idea:</b> Because the supplier was late.</p></div></div>`
  }
];

const questionTypes = [
  {
    level:'LEVEL 1', title:'Câu hỏi chi tiết: tìm thông tin trực tiếp', short:'Detail',

    method:['Đọc câu hỏi và khoanh keyword.', 'Scan bài đọc để tìm keyword hoặc từ cùng nghĩa.', 'Đọc 1-2 câu xung quanh keyword.', 'Chọn đáp án khớp chứng cứ, không chọn đáp án chỉ có từ giống.'],
    trap:['Đáp án đổi ngày/giờ/số tiền.', 'Đáp án lấy thông tin từ dòng khác nhưng không trả lời câu hỏi.', 'Keyword giống nhưng hành động sai.'],
    example:{passage:'Notice: The staff meeting originally scheduled for Tuesday has been moved to Thursday at 3 P.M. in Conference Room B.', question:'When will the staff meeting take place?', options:['Tuesday at 3 P.M.','Thursday at 3 P.M.','Thursday at 9 A.M.','In Conference Room A'], answer:'B', explain:'Câu hỏi hỏi thời gian. Chứng cứ là moved to Thursday at 3 P.M.'}

  {
    level:'LEVEL 2', title:'Main idea / Purpose: văn bản này để làm gì?', short:'Purpose',

    method:['Nhìn loại văn bản: email, notice, advertisement, article.', 'Đọc câu đầu để biết lý do viết.', 'Đọc câu cuối để biết hành động mong muốn.', 'Chọn đáp án bao quát, không quá hẹp.'],
    trap:['Đáp án chỉ đúng một chi tiết nhỏ.', 'Đáp án nghe hợp lý nhưng không phải mục đích chính.', 'Nhầm thông báo với quảng cáo, nhầm complaint với request.'],

  },
  {
    level:'LEVEL 3', title:'NOT / TRUE: kiểm tra đúng-sai từng lựa chọn', short:'True / Not',
    idea:'Dạng này tốn thời gian vì phải kiểm tra nhiều đáp án. Hãy xử lý bằng cách tìm chứng cứ cho từng option, không đoán bằng cảm giác.',
    method:['Đọc kỹ đề hỏi TRUE hay NOT true.', 'Xử từng đáp án một, đánh dấu đúng/sai bên cạnh.', 'Nếu gặp NOT, 3 đáp án đúng trong bài, 1 đáp án sai hoặc không được nói đến.', 'Đừng để chữ NOT làm bạn chọn ngược.'],
    trap:['Quên chữ NOT/EXCEPT.', 'Đáp án không được nhắc đến nhưng nghe hợp lý.', 'Đáp án đổi điều kiện: only, all, before, after, must.'],
    example:{passage:'The cafe is open from 7 A.M. to 6 P.M. Monday through Friday. On Saturdays, it closes at 2 P.M. It is closed on Sundays.', question:'What is NOT true about the cafe?', options:['It opens on weekdays.','It closes at 2 P.M. on Saturdays.','It is open on Sundays.','It opens at 7 A.M. on Mondays.'], answer:'C', explain:'Bài nói closed on Sundays, nên It is open on Sundays là sai.'}
  },
  {
    level:'LEVEL 4', title:'Inference: suy luận có chứng cứ', short:'Inference',
    idea:'Inference không phải đoán xa. Nó là kết luận hợp lý từ 1-2 câu trong bài. Chọn đáp án được chứng cứ hỗ trợ mạnh nhất.',
    method:['Tìm vùng liên quan đến câu hỏi.', 'Hỏi: từ chi tiết này có thể kết luận điều gì chắc nhất?', 'Ưu tiên đáp án khiêm tốn, không quá tuyệt đối.', 'Loại đáp án vượt quá thông tin bài đọc.'],
    trap:['Suy diễn theo đời sống thật nhưng bài không nói.', 'Đáp án dùng all/always/never quá mạnh.', 'Lấy chi tiết đúng nhưng kết luận sai.'],
    example:{passage:'Ms. Chen, your presentation room has been changed to Room 204 because the projector in Room 110 is not working.', question:'What can be inferred about Room 110?', options:['It is larger than Room 204.','It has a problem with its equipment.','It is located on the second floor.','It will be closed permanently.'], answer:'B', explain:'Projector not working là vấn đề thiết bị. Không có chứng cứ cho larger, second floor hoặc permanently.'}
  },
  {
    level:'LEVEL 5', title:'Vocabulary in context: nghĩa theo ngữ cảnh', short:'Vocabulary',
    idea:'TOEIC thường hỏi một từ quen nhưng nghĩa trong bài khác nghĩa phổ biến. Đọc cả câu chứa từ và câu trước/sau.',
    method:['Không dịch từ đơn lẻ ngay.', 'Đọc câu chứa từ cần hỏi.', 'Thử thay từng đáp án vào câu.', 'Chọn nghĩa làm câu vẫn hợp lý trong văn cảnh công việc.'],
    trap:['Chọn nghĩa phổ biến nhất nhưng sai ngữ cảnh.', 'Không nhìn chủ ngữ và tân ngữ quanh từ.', 'Bỏ qua sắc thái positive/negative.'],
    example:{passage:'The manager will address the issue during tomorrow’s staff meeting.', question:'The word "address" is closest in meaning to', options:['write a location','speak to','deal with','mail'], answer:'C', explain:'address the issue nghĩa là xử lý/vào việc với vấn đề, không phải địa chỉ.'}
  },
  {
    level:'LEVEL 6', title:'Sentence insertion: chèn câu vào vị trí đúng', short:'Insertion',
    idea:'Dạng này yêu cầu hiểu mạch văn. Hãy nhìn đại từ, từ nối, this/these/such, và quan hệ nguyên nhân-kết quả.',
    method:['Đọc câu cần chèn, tìm từ nối hoặc đại từ.', 'Xác định câu trước phải giới thiệu được danh từ/ý đó.', 'Xác định câu sau phải tiếp tục mạch logic.', 'Chèn thử và đọc lại 3 câu liên tiếp.'],
    trap:['Chỉ dựa vào keyword giống nhau.', 'Không kiểm tra đại từ this/they/it đang chỉ gì.', 'Bỏ qua however, therefore, as a result.'],
    example:{passage:'[1] The company installed new printers last month. [2] Employees reported that the machines often jammed. [3] A technician will inspect them on Friday. [4] Replacement parts have already been ordered.', question:'Where should the sentence "This problem has slowed several departments." be placed?', options:['[1]','[2]','[3]','[4]'], answer:'C', explain:'This problem phải chỉ việc printers jammed ở câu [2], nên đặt sau [2], tức vị trí [3].'}
  },
  {
    level:'LEVEL 7', title:'Double / Triple passages: nối thông tin nhiều văn bản', short:'Multiple texts',
    idea:'Đây là nhóm khó nhất. Câu trả lời thường nằm ở việc nối tên, ngày, đơn hàng, sự kiện giữa 2-3 văn bản.',
    method:['Đọc câu hỏi trước để biết cần nối thông tin nào.', 'Xác định mỗi văn bản đang đóng vai trò gì: email, receipt, schedule, reply.', 'Tạo cầu nối: tên người, số đơn hàng, ngày, sản phẩm.', 'Không trả lời nếu mới đọc một văn bản mà câu hỏi yêu cầu liên kết.'],
    trap:['Chỉ đọc passage đầu và chọn vội.', 'Nhầm người gửi với người nhận.', 'Không kiểm tra ngày mới nhất hoặc thông tin cập nhật sau cùng.'],
    example:{passage:'Text 1: An invoice shows Order 718 for 40 office chairs. Text 2: An e-mail says 10 chairs from Order 718 were damaged and will be replaced next week.', question:'What will happen next week?', options:['A new invoice will be issued.','Some chairs will be replaced.','The order will be canceled.','A payment will be refunded.'], answer:'B', explain:'Phải nối Order 718 ở invoice với e-mail. E-mail nói 10 chairs will be replaced next week.'}
  }
];

const quizData = [
  {title:'Detail question', passage:'E-mail: Please note that the product demonstration for the new scanner will begin at 10 A.M. in Room 305. All sales representatives should arrive ten minutes early to pick up the handouts.', question:'Where will the demonstration be held?', options:[['A','In Room 305'],['B','In the sales office'],['C','At 10 A.M.'],['D','Near the reception desk']], answer:'A', explain:'Câu hỏi hỏi Where. Chứng cứ: in Room 305.'},
  {title:'Purpose question', passage:'Notice: Starting next Monday, employees must use their identification cards to enter the parking garage. Security staff will be available at the entrance to assist anyone who has trouble with the new system.', question:'What is the notice mainly about?', options:[['A','A change in parking access'],['B','A new employee training program'],['C','A security staff meeting'],['D','A garage cleaning schedule']], answer:'A', explain:'Notice nói từ thứ Hai phải dùng ID card để vào parking garage.'},
  {title:'NOT question', passage:'Advertisement: The Lakeside Fitness Center offers yoga classes, swimming lessons, and personal training sessions. Members can use the sauna for free. The center is closed on national holidays.', question:'What is NOT mentioned as being offered by the center?', options:[['A','Yoga classes'],['B','Swimming lessons'],['C','Nutrition workshops'],['D','Personal training']], answer:'C', explain:'Bài có yoga, swimming, personal training; không nhắc nutrition workshops.'},
  {title:'Inference question', passage:'Memo: Because several customers complained about long wait times, we will add two cashiers during the lunch period beginning tomorrow.', question:'What can be inferred about the store?', options:[['A','It has been too busy at a certain time of day'],['B','It will stop serving lunch'],['C','It recently hired a new manager'],['D','It received complaints about product quality']], answer:'A', explain:'Long wait times + add cashiers during lunch cho thấy giờ trưa quá đông.'},
  {title:'Vocabulary question', passage:'The hotel will waive the late checkout fee for guests attending the conference.', question:'The word "waive" is closest in meaning to', options:[['A','increase'],['B','cancel'],['C','collect'],['D','explain']], answer:'B', explain:'waive a fee nghĩa là bỏ/miễn khoản phí.'},
  {title:'Sentence insertion', passage:'[1] Our online ordering system was updated yesterday. [2] Some customers may need to reset their passwords before placing an order. [3] Customer service agents are prepared to help with this process. [4] We apologize for any inconvenience.', question:'Where should the sentence "This step should take less than two minutes." be placed?', options:[['A','[1]'],['B','[2]'],['C','[3]'],['D','[4]']], answer:'C', explain:'This step chỉ việc reset passwords ở câu [2], nên đặt sau [2], vị trí [3].'},
  {title:'Double passage', passage:'Text 1 - Receipt: Order 4421, desk lamps, delivery date May 12. Text 2 - E-mail: The lamps from Order 4421 arrived with damaged shades. Replacements will be shipped on May 15.', question:'What problem is mentioned in the e-mail?', options:[['A','The order number is incorrect'],['B','The lamps arrived late'],['C','Some parts were damaged'],['D','The delivery address changed']], answer:'C', explain:'E-mail nói arrived with damaged shades. Đây là damaged parts.'},
  {title:'Triple passage', passage:'Text 1 - Schedule: Training session, June 4, 9 A.M. Text 2 - E-mail: Ms. Patel cannot attend on June 4 because of a client visit. Text 3 - Reply: A recording will be sent to anyone absent from the session.', question:'What will Ms. Patel most likely receive?', options:[['A','A client invoice'],['B','A recording of the training'],['C','A new schedule for June 4'],['D','A travel reimbursement form']], answer:'B', explain:'Phải nối Text 2 Ms. Patel absent với Text 3 recording sent to anyone absent.'}
];

const slides = [];
lessonBlocks.forEach(x=>slides.push({kind:'lesson', pageTitle:x.label, label:x.label, title:x.title, html:x.html}));
questionTypes.forEach((t,idx)=>{
  slides.push({kind:'lesson', pageTitle:t.short, label:t.level, title:t.title, html:`<div class="content-area"><p>${t.idea}</p><div class="method-box reveal"><h3>Cách làm</h3><ul class="steps">${t.method.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="danger-box reveal"><h3>Bẫy thường gặp</h3><ul class="steps">${t.trap.map(x=>`<li>${x}</li>`).join('')}</ul></div></div>`});
  slides.push({kind:'example', pageTitle:`Example ${idx+1}`, label:`${t.level} · EXAMPLE`, title:`Ví dụ: ${t.short}`, html:`<div class="content-area"><div class="sample-box reveal show"><div class="sample-title">Passage</div><p>${t.example.passage}</p><div class="question">${t.example.question}</div>${t.example.options.map((o,i)=>`<div class="answer"><b>${String.fromCharCode(65+i)}.</b> ${o}</div>`).join('')}</div><div class="method-box reveal"><h3>Phân tích</h3><ul class="steps"><li>${t.example.explain}</li><li><span class="answer-key">Đáp án đúng: ${t.example.answer}</span></li></ul></div></div>`});
});
quizData.forEach((q,i)=>slides.push({kind:'quiz', pageTitle:`Practice ${i+1}`, label:'PART 7 · PRACTICE', title:`Practice ${i+1}: ${q.title}`, data:q}));
slides.push({kind:'summary', pageTitle:'Summary', label:'TỔNG KẾT', title:'Checklist Part 7 Reading', html:`<div class="content-area"><div class="intro-box"><h3>Checklist trước khi chọn đáp án</h3><ul class="steps"><li>Đã xác định loại câu hỏi chưa?</li><li>Đã tìm được dòng chứng cứ chưa?</li><li>Đáp án có bị đổi ngày, số tiền, người, điều kiện không?</li><li>Nếu là inference, đáp án có suy quá xa không?</li><li>Nếu là double/triple, đã nối đúng văn bản chưa?</li></ul></div><div class="score-box reveal"><div class="score-pill" id="scorePill">Điểm Practice: đang tính...</div><div class="score-pill">8 câu luyện tập</div></div></div>`});

let currentSlide=0;
let checkedState={};
let slideEls=[];

function renderSlides(){
  const mount=document.getElementById('slideMount');
  mount.innerHTML=slides.map((s,idx)=>{
    if(s.kind==='quiz') return renderQuizSlide(s,idx);
    return `<section class="slide ${idx===0?'active':''}" data-index="${idx}"><span class="slide-label">${s.label}</span><h1>${s.title}</h1>${s.html}</section>`;
  }).join('');
  slideEls=[...document.querySelectorAll('.slide')];
  renderPicker();
  updateProgress();
  showSlide(0);
}

function renderQuizSlide(s,idx){
  const q=s.data;
  return `<section class="slide quiz-slide" data-index="${idx}"><span class="slide-label">${s.label}</span><h1>${s.title}</h1><div class="content-area"><div class="sample-box reveal show"><div class="sample-title">Passage</div><p>${escapeHtml(q.passage)}</p><div class="question">${escapeHtml(q.question)}</div>${q.options.map(o=>`<label class="option"><input type="radio" name="quiz-${idx}" value="${o[0]}"><span class="option-letter">${o[0]}.</span><span class="option-text">${escapeHtml(o[1])}</span></label>`).join('')}</div><div class="result-box sample-box" id="result-${idx}"></div></div></section>`;
}

function renderPicker(){
  const grid=document.getElementById('pagePickerGrid');
  grid.innerHTML=slides.map((s,i)=>`<button class="page-jump-btn ${i===currentSlide?'active':''}" onclick="jumpToSlide(${i})" type="button"><span class="page-no">${i+1}</span><span class="page-title">${escapeHtml(s.pageTitle||s.label)}</span></button>`).join('');
}
function updateProgress(){
  document.getElementById('progressText').textContent=(currentSlide+1)+' / '+slides.length;
  document.getElementById('topLine').style.width=((currentSlide+1)/slides.length*100)+'%';
  const isQuiz=slides[currentSlide]?.kind==='quiz';
  document.getElementById('checkBtn').disabled=!isQuiz || !!checkedState[currentSlide];
  renderPicker();
}
function showSlide(index){
  currentSlide=Math.max(0,Math.min(index,slides.length-1));
  slideEls.forEach(el=>el.classList.remove('active'));
  slideEls[currentSlide].classList.add('active');
  slideEls[currentSlide].querySelectorAll('.reveal').forEach((el,i)=>{ if(i===0) el.classList.add('show'); else el.classList.remove('show'); });
  updateProgress();
  updateScore();
}
function goReveal(){
  const hidden=[...slideEls[currentSlide].querySelectorAll('.reveal:not(.show)')];
  if(hidden.length) hidden[0].classList.add('show');
  else nextSlide();
}
function nextSlide(){showSlide(currentSlide+1)}
function prevSlide(){showSlide(currentSlide-1)}
function jumpToSlide(i){closePagePicker();showSlide(i)}
function openPagePicker(){document.getElementById('pagePicker').classList.add('show')}
function closePagePicker(e){if(!e || e.target.id==='pagePicker' || e.target.classList.contains('page-picker-close'))document.getElementById('pagePicker').classList.remove('show')}

function checkAnswer(){
  const s=slides[currentSlide];
  if(!s || s.kind!=='quiz' || checkedState[currentSlide]) return;
  const selected=document.querySelector(`input[name="quiz-${currentSlide}"]:checked`);
  const result=document.getElementById('result-'+currentSlide);
  if(!selected){
    result.className='result-box sample-box wrong-box no-answer show';
    result.innerHTML='<h3 class="result-title">Chưa chọn đáp án</h3>';
    return;
  }
  const isCorrect=selected.value===s.data.answer;
  checkedState[currentSlide]={selected:selected.value,isCorrect};
  slideEls[currentSlide].classList.add('answer-checked','answer-locked');
  result.className='result-box sample-box '+(isCorrect?'show':'wrong-box show');
  result.innerHTML=`<h3>${isCorrect?'Đúng rồi':'Chưa đúng'}</h3><p><b>Bạn chọn:</b> ${selected.value}</p><p><b>Đáp án đúng:</b> <span class="answer-key">${s.data.answer}</span></p><p>${escapeHtml(s.data.explain)}</p>`;
  document.getElementById('checkBtn').disabled=true;
  updateScore();
}
function updateScore(){
  const pill=document.getElementById('scorePill');
  if(!pill) return;
  const done=Object.values(checkedState);
  const correct=done.filter(x=>x.isCorrect).length;
  pill.textContent='Điểm Practice: '+correct+' / '+quizData.length;
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') nextSlide();
  if(e.key==='ArrowLeft') prevSlide();
  if(e.key==='Enter') goReveal();
});
renderSlides();
</script>
</body>
</html>
