<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TOEIC Part 3 + 4 - Cách làm & Practice</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;min-height:100%;
  font-family:Arial,Helvetica,sans-serif;
  background:#eef4ff;color:#172033;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
}
body{overflow-x:hidden}
.lesson-wrapper{width:100%;min-height:100vh;position:relative;background:#eef4ff}
.slide{
  width:100%;min-height:100vh;padding:56px 72px 128px;display:none;
  background:
    radial-gradient(circle at top left,rgba(37,99,235,.12),transparent 34%),
    radial-gradient(circle at bottom right,rgba(14,165,233,.12),transparent 35%),
    #fff;
}
.slide.active{display:flex;flex-direction:column;animation:slideIn .32s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.slide-label{
  display:inline-block;width:fit-content;padding:8px 16px;border-radius:999px;
  background:#dbeafe;color:#1d4ed8;font-weight:700;font-size:15px;margin-bottom:18px
}
h1{font-size:48px;line-height:1.15;color:#0f172a;margin-bottom:18px;letter-spacing:-1px}
h2{font-size:40px;line-height:1.18;color:#0f172a;margin-bottom:20px;letter-spacing:-.5px}
h3{font-size:25px;color:#1e3a8a;margin-bottom:12px}
p{font-size:22px;line-height:1.55;margin-bottom:13px;color:#334155}
.content-area{max-width:1180px;margin-top:10px;padding-bottom:40px}
.reveal{opacity:0;transform:translateY(18px);filter:blur(3px);transition:all .38s ease;pointer-events:none}
.reveal.show{opacity:1;transform:translateY(0);filter:blur(0);pointer-events:auto}
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:18px}
.card{
  background:#f8fafc;border:2px solid #e2e8f0;border-radius:22px;padding:22px 24px;
  box-shadow:0 12px 28px rgba(15,23,42,.07)
}
.card.blue{background:#eff6ff;border-color:#bfdbfe}
.card.green{background:#f0fdf4;border-color:#bbf7d0}
.card.orange{background:#fff7ed;border-color:#fed7aa}
.card.rose{background:#fff1f2;border-color:#fecdd3}
.card h3{font-size:24px;margin-bottom:10px}
.card p,.card li{font-size:20px;line-height:1.48;color:#334155}
.steps{list-style:none;margin-top:8px}
.steps li{position:relative;padding:9px 0 9px 36px}
.steps li::before{
  content:"✓";position:absolute;left:0;top:9px;width:24px;height:24px;border-radius:50%;
  display:grid;place-items:center;background:#22c55e;color:white;font-size:15px;font-weight:700
}
.steps.warning li::before{content:"!";background:#f97316}
.big-word{font-size:64px;font-weight:700;color:#1d4ed8;letter-spacing:-2px;margin:4px 0 14px}
.formula{
  font-size:clamp(26px,2.6vw,40px);font-weight:700;line-height:1.28;
  padding:20px 24px;margin:18px 0;background:#eff6ff;border:4px solid #93c5fd;
  border-radius:24px;color:#0f172a;text-align:center
}
.keyword-demo,.practice-panel{
  background:#fff;border:2px solid #dbeafe;border-radius:24px;padding:24px;
  box-shadow:0 14px 30px rgba(37,99,235,.10);margin-top:18px
}
.demo-question,.practice-question{
  font-size:30px;line-height:1.35;font-weight:700;color:#0f172a;margin-bottom:16px
}
.option-list{display:grid;gap:10px;margin-top:10px}
.option{
  position:relative;display:flex;align-items:flex-start;gap:12px;
  border:2px solid #dbeafe;background:#fff;border-radius:16px;padding:14px 16px;
  color:#334155;font-size:21px;line-height:1.35;cursor:pointer;transition:.18s ease
}
.option:hover{border-color:#93c5fd;transform:translateY(-1px)}
.option input{width:20px;height:20px;margin-top:4px;accent-color:#2563eb;flex:0 0 auto}
.option-letter{font-weight:700;color:#1d4ed8;min-width:30px;width:30px;height:30px;border-radius:999px;border:2px solid #bfdbfe;display:inline-flex;align-items:center;justify-content:center;background:#eff6ff;flex:0 0 30px}
.option.correct .option-letter{background:#22c55e;color:#fff;border-color:#16a34a}
.option.wrong .option-letter{background:#ef4444;color:#fff;border-color:#dc2626}
.option.correct{border-color:#22c55e;background:#ecfdf5}
.option.wrong{border-color:#ef4444;background:#fff1f2}
.option.locked{cursor:not-allowed}
.option.locked:hover{transform:none}
mark.kw{
  background:#fde68a;color:#7c2d12;border-radius:7px;padding:1px 4px;
  box-decoration-break:clone;-webkit-box-decoration-break:clone;font-weight:700
}
.keyword-row{display:flex;gap:8px;flex-wrap:wrap;margin:9px 0}
.keyword-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe;
  border-radius:999px;padding:8px 12px;font-size:17px;font-weight:700
}
.keyword-chip.option-chip{background:#f0fdf4;color:#166534;border-color:#bbf7d0}
.keyword-zone{
  display:none;margin-top:16px;background:#f8fafc;border:2px dashed #bfdbfe;border-radius:18px;padding:16px 18px
}
.keyword-zone.show{display:block;animation:fadeUp .22s ease}
.mini-title{font-size:18px;font-weight:700;color:#475569;margin:6px 0}
.quick-rule-box{margin-top:26px}
.transcript-btn{
  border:none;cursor:pointer;border-radius:999px;background:#0f172a;color:#fff;
  padding:11px 16px;font-size:15px;font-weight:700;box-shadow:0 8px 16px rgba(15,23,42,.16);
  transition:.18s ease;margin:8px 0 12px
}
.transcript-btn:hover{transform:translateY(-1px);background:#1d4ed8}

.audio-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:6px 0 12px}
.audio-btn{
  border:none;cursor:pointer;border-radius:999px;background:#2563eb;color:#fff;
  padding:11px 16px;font-size:15px;font-weight:700;box-shadow:0 8px 16px rgba(37,99,235,.16);
  transition:.18s ease;display:inline-flex;align-items:center;gap:7px
}
.audio-btn:hover{transform:translateY(-1px);background:#1d4ed8}
.audio-btn.playing{background:#16a34a}
.audio-path{font-size:14px;color:#64748b;font-weight:700;background:#f8fafc;border:1px solid #e2e8f0;border-radius:999px;padding:7px 10px}
.transcript-box{
  display:none;background:#f8fafc;border:2px solid #e2e8f0;border-radius:18px;padding:16px 18px;margin:6px 0 16px
}
.transcript-box.show{display:block;animation:fadeUp .22s ease}
.turn{font-size:20px;line-height:1.55;margin:8px 0;color:#334155}
.speaker{font-weight:700;color:#1d4ed8;margin-right:7px}
.result-box{
  display:none;margin-top:18px;border-radius:22px;border:2px solid #bfdbfe;background:#eff6ff;
  padding:20px 22px;box-shadow:0 12px 26px rgba(37,99,235,.08)
}
.result-box.show{display:block;animation:fadeUp .22s ease}
.result-box.correct-result{border-color:#86efac;background:#f0fdf4}
.result-box.wrong-result{border-color:#fecdd3;background:#fff1f2}
.result-box.no-answer{border-color:#fed7aa;background:#fff7ed}
.answer-line{font-size:22px;line-height:1.5;color:#334155;margin:8px 0}
.answer-key{font-weight:700;color:#15803d}
.wrong-text{font-weight:700;color:#be123c}
.correct-text{font-weight:700;color:#15803d}
.method-table{
  width:100%;border-collapse:separate;border-spacing:0;margin-top:16px;overflow:hidden;border-radius:18px;
  border:2px solid #dbeafe;background:#fff
}
.method-table th,.method-table td{padding:15px 16px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:20px;line-height:1.35}
.method-table th{background:#eff6ff;color:#1d4ed8;font-weight:700}
.method-table tr:last-child td{border-bottom:none}
.control-bar{
  position:fixed;left:0;right:0;bottom:16px;z-index:100;
  display:flex;justify-content:center;align-items:center;gap:14px;pointer-events:none;flex-wrap:wrap;padding:0 12px
}
.go-btn,.check-btn,.nav-btn{
  pointer-events:auto;border:none;cursor:pointer;font-weight:700;transition:all .18s ease;
  box-shadow:0 8px 18px rgba(15,23,42,.18)
}
.go-btn{
  width:54px;height:54px;border-radius:50%;background:#2563eb;color:white;
  font-size:15px;letter-spacing:.5px
}
.go-btn:hover,.check-btn:hover{transform:scale(1.05);background:#1d4ed8}
.check-btn{border-radius:999px;background:#2563eb;color:#fff;font-size:15px;letter-spacing:.5px;padding:13px 22px}
.check-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.nav-btn{border-radius:999px;padding:10px 16px;background:#e2e8f0;color:#0f172a;font-size:14px}
.nav-btn:hover{background:#cbd5e1}
.progress{
  position:fixed;top:24px;right:36px;z-index:120;font-size:16px;font-weight:700;color:#64748b;
  background:rgba(255,255,255,.86);padding:8px 12px;border-radius:999px;backdrop-filter:blur(6px);
  box-shadow:0 6px 14px rgba(15,23,42,.08)
}
.progress-btn{border:none;cursor:pointer}
.progress-btn:hover{background:#eff6ff;color:#1d4ed8}
.top-line{position:fixed;top:0;left:0;height:7px;background:#2563eb;width:0%;transition:width .3s ease;z-index:130}
.page-picker-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.42);z-index:300;display:none;
  align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)
}
.page-picker-overlay.show{display:flex}
.page-picker-panel{
  width:min(980px,96vw);max-height:84vh;overflow:auto;background:#fff;border-radius:26px;
  border:2px solid #dbeafe;box-shadow:0 24px 60px rgba(15,23,42,.24);padding:22px
}
.page-picker-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}
.page-picker-head h3{margin:0;color:#0f172a;font-size:28px}
.page-picker-head p{margin:6px 0 0;color:#64748b;font-size:17px;line-height:1.4}
.page-picker-close{border:none;cursor:pointer;width:40px;height:40px;border-radius:999px;background:#e2e8f0;color:#0f172a;font-size:28px;line-height:1;font-weight:700}
.page-picker-close:hover{background:#cbd5e1}
.page-picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px}
.page-jump-btn{
  border:2px solid #dbeafe;border-radius:16px;background:#f8fafc;color:#0f172a;padding:10px 8px;
  min-height:58px;cursor:pointer;text-align:left;transition:.18s ease;font-size:14px;font-weight:700;line-height:1.25
}
.page-jump-btn:hover{border-color:#93c5fd;background:#eff6ff;transform:translateY(-1px)}
.page-jump-btn.active{border-color:#2563eb;background:#dbeafe;color:#1d4ed8}
.page-jump-btn.done-correct{border-color:#22c55e;background:#ecfdf5}
.page-jump-btn.done-wrong{border-color:#ef4444;background:#fff1f2}
.page-jump-btn .page-no{display:block;font-size:18px;font-weight:700}
.page-jump-btn .page-title{display:block;color:#64748b;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){
  .slide{padding:36px 24px 132px}
  h1{font-size:34px}h2{font-size:30px}.big-word{font-size:42px}
  p,.card p,.card li,.method-table th,.method-table td,.turn,.answer-line{font-size:18px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .demo-question,.practice-question{font-size:24px}
  .option{font-size:18px}
  .go-btn{width:48px;height:48px;font-size:13px}
  .check-btn{padding:11px 16px;font-size:13px}
  .nav-btn{padding:9px 13px;font-size:13px}
  .progress{top:14px;right:14px;font-size:13px}
  .page-picker-grid{grid-template-columns:repeat(auto-fill,minmax(86px,1fr))}
}

.visual-card{
  background:transparent;border:0;border-radius:0;padding:0 0 8px;
  margin:4px 0 16px;box-shadow:none;overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;max-width:100%
}
.visual-title{font-size:20px;font-weight:700;color:#1d4ed8;margin-bottom:12px;white-space:nowrap}
.visual-note{font-size:16px;color:#64748b;font-weight:700;margin-top:8px}
.graphic-table{min-width:640px;width:100%;border-collapse:separate;border-spacing:0;border:2px solid #cbd5e1;border-radius:16px;overflow:hidden;background:#fff}
.graphic-table th,.graphic-table td{padding:12px 14px;border-bottom:1px solid #e2e8f0;border-right:1px solid #e2e8f0;font-size:18px;text-align:left;color:#334155}
.graphic-table th{background:#eff6ff;color:#1d4ed8;font-weight:700}
.graphic-table tr:last-child td{border-bottom:none}.graphic-table th:last-child,.graphic-table td:last-child{border-right:none}
.coupon-box{min-width:560px;border:3px dashed #93c5fd;border-radius:20px;background:#eff6ff;padding:18px;text-align:center}
.coupon-main{font-size:34px;font-weight:700;color:#1d4ed8;line-height:1.2}.coupon-sub{font-size:20px;font-weight:700;color:#334155;margin-top:8px}
.notice-grid{min-width:620px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.notice-item{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:12px}.notice-item b{color:#1d4ed8}
@media(max-width:900px){.graphic-table th,.graphic-table td{font-size:15px;padding:10px}.coupon-main{font-size:26px}.notice-grid{grid-template-columns:1fr}}

</style>
</head>

<div class="lesson-wrapper">
  <div class="top-line" id="topLine"></div>
  <button class="progress progress-btn" id="progressText" onclick="openPagePicker()" type="button" title="Chọn trang">1 / 1</button>
  <div id="slideMount"></div>

  <div class="page-picker-overlay" id="pagePicker" onclick="closePagePicker(event)">
    <div class="page-picker-panel" role="dialog" aria-modal="true" aria-labelledby="pagePickerTitle">
      <div class="page-picker-head">
        <div>
          <h3 id="pagePickerTitle">Chọn trang</h3>
          <p>Click để nhảy nhanh đến phương pháp hoặc bài luyện tập.</p>
        </div>
        <button class="page-picker-close" onclick="closePagePicker()" type="button">×</button>
      </div>
      <div class="page-picker-grid" id="pagePickerGrid"></div>
    </div>
  </div>

  <div class="control-bar">
    <button class="nav-btn" onclick="prevSlide()" type="button">← PREV</button>
    <button class="go-btn" onclick="goReveal()" type="button">GO</button>
    <button class="check-btn" id="checkBtn" onclick="checkAnswer()" type="button">CHECK</button>
    <button class="nav-btn" onclick="nextSlide()" type="button">NEXT →</button>
  </div>
</div>

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function escapeRegExp(str){return String(str).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function normalizeKeywordList(list){
  return (list || []).flatMap(k=>Array.isArray(k) ? k : [k]).filter(Boolean);
}
function primaryKeywordList(list){
  return (list || []).flatMap(k=>Array.isArray(k) ? [k[0]] : [k]).filter(Boolean);
}
function renderKeywordChips(list, cls=''){
  return primaryKeywordList(list).map(k=>`<span class="keyword-chip ${cls}">${escapeHtml(k)}</span>`).join('');
}
function highlightText(text, phrases){
  const src = String(text ?? '');
  const keys = [...new Set((phrases || []).filter(Boolean).map(String))]
    .sort((a,b)=>b.length-a.length);
  if(!keys.length) return escapeHtml(src);

  const ranges = [];
  keys.forEach(key=>{
    const pattern = escapeRegExp(key).replace(/\s+/g,'\\s+');
    const re = new RegExp(pattern,'gi');
    let match;
    while((match = re.exec(src))){
      const start = match.index;
      const end = start + match[0].length;
      if(end <= start) break;
      const overlaps = ranges.some(r=>start < r.end && end > r.start);
      if(!overlaps) ranges.push({start,end});
    }
  });

  if(!ranges.length) return escapeHtml(src);
  ranges.sort((a,b)=>a.start-b.start);
  let out = '';
  let last = 0;
  ranges.forEach(r=>{
    out += escapeHtml(src.slice(last, r.start));
    out += `<mark class="kw">${escapeHtml(src.slice(r.start, r.end))}</mark>`;
    last = r.end;
  });
  out += escapeHtml(src.slice(last));
  return out;
}

  document.getElementById('topLine').style.width = `${((currentSlide+1)/slides.length)*100}%`;
  const isPractice = slides[currentSlide].dataset.kind === 'practice';
  document.getElementById('checkBtn').disabled = !isPractice;
  updatePagePickerState();
}
function updatePagePickerState(){
  document.querySelectorAll('.page-jump-btn').forEach(btn=>{
    const page = Number(btn.dataset.page);
    btn.classList.toggle('active', page === currentSlide);
    btn.classList.remove('done-correct','done-wrong');
    const slide = slides[page];
    if(slide?.dataset.kind === 'practice'){
      const idx = slide.dataset.practice;
      if(answered[idx]?.correct) btn.classList.add('done-correct');
      else if(answered[idx]) btn.classList.add('done-wrong');
    }
  });

function goReveal(){

  if(slide.dataset.kind === 'demo-option-keywords'){
    const step = Number(slide.dataset.demoStep || 0);
    const quickRule = slide.querySelector('.quick-rule-box');
    if(step === 0){
      highlightDemo(slide);

  const hidden = slide.querySelector('.reveal:not(.show)');

  highlightDemo(slide);
}

    currentAudio.currentTime = 0;
    currentAudioBtn?.classList.remove('playing');
    if(currentAudioBtn) currentAudioBtn.textContent = '▶ PLAY';
  }

  currentAudio = new Audio(src);
  currentAudioBtn = btn;
  btn?.classList.add('playing');
  if(btn) btn.textContent = '⏸ PLAYING';
  currentAudio.addEventListener('ended',()=>{
    btn?.classList.remove('playing');
    if(btn) btn.textContent = '▶ PLAY';
  });
  currentAudio.addEventListener('error',()=>{
    btn?.classList.remove('playing');
    if(btn) btn.textContent = '▶ PLAY';
  });
  currentAudio.play().catch(()=>{
    btn?.classList.remove('playing');
    if(btn) btn.textContent = '▶ PLAY';
  });
}

function toggleTranscript(idx){
  const box = document.getElementById(`transcript-${idx}`);
  box.classList.toggle('show');
}
function checkAnswer(){
  const slide = slides[currentSlide];
  if(slide.dataset.kind !== 'practice') return;
  const idx = Number(slide.dataset.practice);
  const item = practiceData[idx];

  highlightPractice(idx);

  const selected = slide.querySelector(`input[name="q${idx}"]:checked`);
  const selectedValue = selected ? selected.value : '';
  const isCorrect = selectedValue === item.answer;
  answered[idx] = {selected:selectedValue, correct:isCorrect};

  slide.querySelectorAll('.option').forEach(opt=>{
    const letter = opt.dataset.letter;
    opt.classList.add('locked');
    opt.querySelector('input').disabled = true;
    opt.classList.remove('correct','wrong');
    if(letter === item.answer) opt.classList.add('correct');
    if(selectedValue && letter === selectedValue && letter !== item.answer) opt.classList.add('wrong');
  });

  const result = document.getElementById(`result-${idx}`);
  result.className = 'result-box show ' + (!selectedValue ? 'no-answer' : isCorrect ? 'correct-result' : 'wrong-result');
  const answerText = item.options.find(o=>o[0]===item.answer)?.[1] || '';
  const selectedLine = selectedValue
    ? (isCorrect ? `<span class="correct-text">Bạn chọn ${selectedValue}: đúng.</span>` : `<span class="wrong-text">Bạn chọn ${selectedValue}: chưa đúng.</span>`)
    : `<span class="wrong-text">Bạn chưa chọn đáp án.</span>`;

  result.innerHTML = `
    <h3>${selectedLine}</h3>
    <div class="answer-line"><b>Đáp án:</b> <span class="answer-key">${item.answer}. ${escapeHtml(answerText)}</span></div>
    <div class="answer-line"><b>Giải thích:</b> ${item.explain}</div>
  `;
  updatePagePickerState();
}
document.addEventListener('keydown', e=>{
  if(e.key === 'ArrowRight') nextSlide();
  if(e.key === 'ArrowLeft') prevSlide();
  if(e.key === 'Enter') goReveal();
  if(e.key.toLowerCase() === 'c') checkAnswer();
});
document.addEventListener('contextmenu', e=>e.preventDefault());
renderSlides();
</script>
