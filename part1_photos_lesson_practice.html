<script>
function escapeHtml(str){return String(str ?? '').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}

const partTypes = [
  {
    type:'one-person', no:1, title:'Loại 1: Ảnh một người đang hành động', short:'One person',
    idea:'Ảnh có một người là dạng dễ gặp nhất. Trọng tâm là người đó đang làm gì, đang cầm gì, đang đứng/ngồi ở đâu.',
    formula:'WHO + is/are + V-ing + OBJECT / PLACE',
    tips:['Nhìn hành động chính trước: reading, carrying, typing, watering, repairing.','Cẩn thận đáp án dùng danh từ đúng nhưng hành động sai.','Nếu ảnh có người, đáp án thường dùng hiện tại tiếp diễn: is/are + V-ing.','Đừng chọn đáp án suy diễn mục đích nếu ảnh không thể hiện rõ.'],
    example:{scene:'ex-one-person', caption:'A woman is watering plants in a garden.', answer:'B', options:[['A','A woman is cutting flowers.','Một phụ nữ đang cắt hoa.'],['B','A woman is watering some plants.','Một phụ nữ đang tưới cây.'],['C','A woman is painting a fence.','Một phụ nữ đang sơn hàng rào.'],['D','A woman is sweeping the floor.','Một phụ nữ đang quét sàn.']], analysis:['Người trong ảnh đang cầm bình tưới.','Động tác chính là watering plants.','Không có hành động cutting/painting/sweeping.']}
  },
  {
    type:'many-people', no:2, title:'Loại 2: Ảnh nhiều người / tương tác', short:'People',
    idea:'Ảnh có hai người trở lên thường hỏi hành động chung, vị trí tương đối, hoặc một người đang đưa/nhận/cầm thứ gì.',
    formula:'Several people / Two people + are + V-ing',
    tips:['Đếm số người và xem họ có cùng làm một hành động hay không.','Chú ý giới từ: across from, beside, around, behind, in front of.','Cẩn thận đáp án nói một người đang làm việc mà ảnh là cả nhóm.','Không chọn hành động không thấy rõ như signing, paying, calling nếu ảnh không thể hiện.'],
    example:{scene:'ex-many-people', caption:'Two colleagues are shaking hands beside a table.', answer:'C', options:[['A','Two people are moving chairs.','Hai người đang di chuyển ghế.'],['B','Two people are eating lunch.','Hai người đang ăn trưa.'],['C','Two people are shaking hands.','Hai người đang bắt tay.'],['D','Two people are hanging pictures.','Hai người đang treo tranh.']], analysis:['Có hai người đối diện nhau.','Tay của họ chạm nhau ở giữa.','Hành động chính là shaking hands.']}
  },
  {
    type:'object', no:3, title:'Loại 3: Ảnh đồ vật / không có người', short:'Objects',
    idea:'Ảnh không có người thường tập trung vào vị trí, trạng thái, số lượng hoặc việc đồ vật đã được sắp xếp/đặt ở đâu.',
    formula:'OBJECT + is/are + placed / arranged / displayed + PLACE',
    tips:['Tập trung vào danh từ chính: boxes, chairs, bicycles, dishes, computers.','Đáp án thường dùng bị động: are arranged, are displayed, have been placed.','Cẩn thận giới từ sai: on / under / beside / in front of.','Không chọn đáp án có người nếu ảnh hoàn toàn không có người.'],
    example:{scene:'ex-object', caption:'Several chairs are arranged around a table.', answer:'A', options:[['A','Several chairs are arranged around a table.','Nhiều ghế được sắp quanh một chiếc bàn.'],['B','Some books are stacked on the floor.','Một vài quyển sách được xếp trên sàn.'],['C','A computer is being repaired.','Một máy tính đang được sửa.'],['D','A table is covered with food.','Một chiếc bàn được phủ đầy thức ăn.']], analysis:['Ảnh không có người.','Danh từ chính là chairs và table.','Giới từ đúng là around a table.']}
  },
  {
    type:'workplace', no:4, title:'Loại 4: Ảnh văn phòng / cửa hàng / nơi làm việc', short:'Workplace',

    formula:'A person / customers / items + be + V-ing / placed / displayed',
    tips:['Xác định bối cảnh: office, store, restaurant, reception desk.','Nhìn đồ vật nghề nghiệp: laptop, shelves, counter, documents, headset.','Chú ý hành động nhỏ: typing, pointing, checking, serving.','Cẩn thận đáp án đúng nơi nhưng sai hành động.'],
    example:{scene:'ex-workplace', caption:'A man is typing on a laptop at a desk.', answer:'D', options:[['A','A man is cleaning a window.','Một người đàn ông đang lau cửa sổ.'],['B','A man is serving customers.','Một người đàn ông đang phục vụ khách hàng.'],['C','A man is carrying a ladder.','Một người đàn ông đang mang thang.'],['D','A man is typing on a laptop.','Một người đàn ông đang gõ trên máy tính xách tay.']], analysis:['Bối cảnh là bàn làm việc.','Người đàn ông đặt tay trên laptop.','Hành động chính là typing.']}
  },

function normalizeCaptionText(text){
  return String(text||'').replace(/[.]+$/,'').trim();
}
function parseCaptionParts(caption){
  const raw = normalizeCaptionText(caption);
  const auxMatch = raw.match(/\b(is|are)\b/i);
  if(!auxMatch){return {subject:raw, action:'', object:'', adverbial:''};}
  const idx = auxMatch.index;
  const subject = raw.slice(0, idx).trim();
  let rest = raw.slice(idx + auxMatch[0].length).trim();
  const words = rest.split(/\s+/).filter(Boolean);
  const prepWords = ['in','on','at','by','beside','near','around','under','over','onto','to','against','across','inside','outside','with','for','from','into','off'];
  let actionCount = 1;
  if(words[0] === 'being' && words.length > 1) actionCount = 2;
  else if(words.length > 1 && prepWords.includes(words[1].toLowerCase())) actionCount = 2;
  let action = words.slice(0, actionCount).join(' ');
  let remaining = words.slice(actionCount);
  let splitAt = remaining.findIndex(w => prepWords.includes(w.toLowerCase()));
  let object = '';
  let adverbial = '';
  if(splitAt === -1){
    object = remaining.join(' ');
  } else {
    object = remaining.slice(0, splitAt).join(' ');
    adverbial = remaining.slice(splitAt).join(' ');
  }
  if(action.toLowerCase()==='waiting in' && object.toLowerCase()==='line'){ action='waiting'; object='in line'; }
  if(action.toLowerCase()==='looking at' && object){ action='looking at'; }
  return {subject, action, object, adverbial};
}
function sceneGroup(scene){
  if(scene.startsWith('ex-one-person') || /^p\d+$/.test(scene)) return 'one-person';
  if(scene.startsWith('ex-many-people') || /^m\d+$/.test(scene)) return 'many-people';
  if(scene.startsWith('ex-object') || /^o\d+$/.test(scene)) return 'object';
  if(scene.startsWith('ex-workplace') || /^w\d+$/.test(scene)) return 'workplace';
  if(scene.startsWith('ex-outdoor') || /^t\d+$/.test(scene)) return 'outdoor';
  return 'one-person';
}

function getAnnotationLayout(scene){
  return sceneAnnotationLayouts[scene] || annotationLayouts[sceneGroup(scene)] || annotationLayouts['one-person'];
}
function fitText(value, maxLen=22){
  value = String(value || '').trim();
  if(value.length <= maxLen) return value;
  return value.slice(0, maxLen-1).trim() + '…';
}
function annotationOverlay(scene, caption){
  const parts = parseCaptionParts(caption);
  const group = sceneGroup(scene);
  const layout = getAnnotationLayout(scene);
  const values = {
    subject: parts.subject,
    action: parts.action,
    object: parts.object,
    adverbial: parts.adverbial
  };
  const boxes = layout.filter(item => values[item.key]).map(item => {
    const value = fitText(values[item.key]);
    const bw = Math.max(148, Math.min(210, 58 + value.length * 6.2));
    const bh = 42;
    const cx = item.bx + bw / 2;
    const cy = item.by + bh / 2;
    return `<g class="annotation-step reveal"><line class="annotation-line" x1="${cx}" y1="${cy}" x2="${item.ax}" y2="${item.ay}" /><circle class="annotation-dot" cx="${item.ax}" cy="${item.ay}" r="4" /><rect class="annotation-note-box" x="${item.bx}" y="${item.by}" width="${bw}" height="${bh}" /><text class="annotation-note-title" x="${item.bx+10}" y="${item.by+14}">${escapeHtml(item.title)}</text><text class="annotation-note-value" x="${item.bx+10}" y="${item.by+29}">${escapeHtml(value)}</text></g>`;
  }).join('');
  return `<svg class="annotation-overlay" viewBox="0 0 520 340" preserveAspectRatio="none" aria-hidden="true">${boxes}</svg>`;
}
function renderMaskedCaption(caption, key, audioSrc=''){
  const audioBtn = audioSrc ? `<button type="button" class="audio-btn" onclick="playPhotoAudio('${audioSrc}', this)" aria-label="Play audio">🔊</button>` : '';
  return `<div class="photo-caption photo-caption-mask" id="mask-${key}"><div class="caption-meta">${audioBtn}<button type="button" class="peek-toggle" onclick="toggleMaskedCaption('${key}', this)" aria-label="Hiện hoặc ẩn câu mô tả"><span class="peek-icon">🙈</span></button></div><div class="caption-sentence sentence-blur">${escapeHtml(caption)}</div></div>`;
}
function toggleMaskedCaption(key, btn){
  const wrap = document.getElementById('mask-' + key);
  if(!wrap) return;
  const sentence = wrap.querySelector('.caption-sentence');
  const isHidden = sentence.classList.contains('sentence-blur');
  sentence.classList.toggle('sentence-blur', !isHidden);
  btn.classList.toggle('active', isHidden);
  const icon = btn.querySelector('.peek-icon');
  if(icon) icon.textContent = isHidden ? '👁️' : '🙈';
}

let currentAudio = null;
function playPhotoAudio(src, btn){
  try{
    if(currentAudio){
      currentAudio.pause();
      currentAudio.currentTime = 0;
      document.querySelectorAll('.audio-btn.playing').forEach(b=>b.classList.remove('playing'));
    }
    currentAudio = new Audio(src);
    btn.classList.add('playing');
    currentAudio.addEventListener('ended',()=>btn.classList.remove('playing'));
    currentAudio.addEventListener('error',()=>{
      btn.classList.remove('playing');
      alert('Chưa tìm thấy file audio: ' + src);
    });
    currentAudio.play();
  }catch(err){
    alert('Không phát được audio: ' + src);
  }
}

function renderAnnotatedFrame(scene, caption, key, mode='normal'){
  const overlay = mode === 'practice' ? practiceAnnotationOverlay(scene, caption) : annotationOverlay(scene, caption);
  return `<div class="photo-frame"><div class="image-stage">${sceneSvg(scene)}${overlay}</div></div>`;
}

      const photoHtml = q.image
        ? renderCustomPhotoFrame(q.image, q.caption, 'quiz-'+idx, q.photoId, 'practice')
        : renderAnnotatedFrame(q.scene, q.caption, 'quiz-'+idx, 'practice');

      const optionsHtml = q.options.map(o=>`
        <label class="option">
          <input type="radio" name="q${idx}" value="${o[0]}">
          <span class="option-letter">${o[0]}.</span>
          <span class="option-text option-blur">
            ${escapeHtml(o[1])}
            <span class="option-vn">${escapeHtml(o[2])}</span>
          </span>
        </label>
      `).join('');

      return `<section class="slide quiz-slide" data-index="${idx}">
        <span class="slide-label">${escapeHtml(s.label)}</span>
        <h2>${escapeHtml(s.title)}</h2>

        <div class="content-area">
          <div class="photo-layout">
            <div class="reveal show">${photoHtml}</div>

            <div class="practice-side">
              <div class="sample-box reveal show">
                <div class="sample-title">
                  Part 1 Practice <span class="audio-note">Luyện bằng chữ trước khi nghe audio</span>
                </div>

                <div class="question">
                  <span>Which sentence best describes the photo?</span>
                  <button type="button" class="audio-btn inline-audio-btn" onclick="playPhotoAudio(audioPathForQuestion(slides[currentSlide].data), this)" aria-label="Play audio">🔊</button>
                </div>

                ${optionsHtml}
              </div>

              <div class="method-box result-box" id="result-${idx}">
                <h3 class="result-title"></h3>
                <p class="explain"></p>
              </div>
</div>
          </div>
        </div>
      </section>`;
    }

    return `<section class="slide" data-index="${idx}">
      <span class="slide-label">${escapeHtml(s.label)}</span>
      <h1>${escapeHtml(s.title)}</h1>
      ${s.html}
    </section>`;
  }).join('');
}

function renderPicker(){
  const grid=document.getElementById('pagePickerGrid');
  grid.innerHTML=slides.map((s,i)=>{
    let cls='page-jump-btn';
    if(i===currentSlide) cls+=' active';
    if(s.kind==='quiz' && checkedState[i]) cls += checkedState[i].isCorrect ? ' correct-answer' : ' wrong-answer';
    const title=s.kind==='quiz' ? s.title : (s.pageTitle || s.label);
    return `<button type="button" class="${cls}" onclick="jumpToSlide(${i})"><span class="page-no">${i+1}</span><span class="page-title">${escapeHtml(title)}</span></button>`;
  }).join('');
}

function updateProgress(){
  document.getElementById('progressText').textContent=(currentSlide+1)+' / '+slides.length;
  document.getElementById('topLine').style.width=((currentSlide+1)/slides.length*100)+'%';
  const isQuiz=slides[currentSlide]?.kind==='quiz';
  document.getElementById('checkBtn').disabled=!isQuiz || !!checkedState[currentSlide];
  renderPicker();
  updateScore();
}
function showSlide(index){
  const slideEls=[...document.querySelectorAll('.slide')];
  if(index<0||index>=slideEls.length) return;
  slideEls.forEach(s=>s.classList.remove('active'));
  currentSlide=index;
  slideEls[currentSlide].classList.add('active');
  slideEls[currentSlide].querySelectorAll('.reveal').forEach((el,i)=>{ if(i===0) el.classList.add('show'); else el.classList.remove('show'); });
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}
function goReveal(){
  const items=[...document.querySelectorAll('.slide.active .reveal')];
  const next=items.find(el=>!el.classList.contains('show'));
  if(next) next.classList.add('show');
}
function nextSlide(){showSlide(Math.min(currentSlide+1,slides.length-1));}
function prevSlide(){showSlide(Math.max(currentSlide-1,0));}
function jumpToSlide(i){closePagePicker();showSlide(i);}
function openPagePicker(){renderPicker();document.getElementById('pagePicker').classList.add('show');}
function closePagePicker(e){if(!e || e.target.id==='pagePicker' || e.target.classList.contains('page-picker-close')) document.getElementById('pagePicker').classList.remove('show');}

function checkAnswer(){
  const s=slides[currentSlide];
  if(!s || s.kind!=='quiz') return;
  if(checkedState[currentSlide]) return;
  const slide=document.querySelector('.slide.active');
  const selected=slide.querySelector('input[type="radio"]:checked');
  const result=slide.querySelector('.result-box');
  const title=result.querySelector('.result-title');
  const explain=result.querySelector('.explain');
  result.className='method-box result-box show';
  if(!selected){
    result.classList.add('no-answer');
    title.innerHTML='<span class="wrong-text">Hãy chọn một đáp án trước.</span>';
    return;
  }
  const q=s.data;
  const isCorrect=selected.value===q.answer;
  checkedState[currentSlide]={selected:selected.value,isCorrect};
  if(isCorrect){title.innerHTML='<span class="correct-text">Chính xác!</span>';}
  else{result.classList.add('wrong-box');title.innerHTML='<span class="wrong-text">Chưa đúng.</span>';}
  explain.innerHTML=`<span class="answer-key">Đáp án đúng: ${q.answer}</span> — ${escapeHtml(q.explain)}`;
  slide.querySelectorAll('input[type="radio"]').forEach(x=>x.disabled=true);
  slide.classList.add('answer-locked','answer-checked');
  updateProgress();
}
function updateScore(){
  const pill=document.getElementById('scorePill');
  if(!pill) return;
  const total=quizData.length;
  const done=Object.values(checkedState).length;
  const correct=Object.values(checkedState).filter(x=>x.isCorrect).length;
  pill.textContent=`Điểm Practice: ${correct} / ${total} · Đã check ${done}/${total}`;
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') nextSlide();
  if(e.key==='ArrowLeft') prevSlide();
  if(e.key==='Enter') goReveal();
});


function installContentGuards(){
  const block = e => {
    e.preventDefault();
    e.stopPropagation();
    return false;
  };
  ['contextmenu','dragstart','selectstart','copy','cut','paste'].forEach(evt=>{
    document.addEventListener(evt, block, {capture:true});
  });
  document.addEventListener('keydown', e=>{
    const key = String(e.key || '').toLowerCase();
    const blocked =
      key === 'f12' ||
      (e.ctrlKey && ['s','u','p','o','a','c','x','v'].includes(key)) ||
      (e.ctrlKey && e.shiftKey && ['i','j','c','s'].includes(key)) ||
      (e.metaKey && ['s','u','p','o','a','c','x','v'].includes(key));
    if(blocked) block(e);
  }, {capture:true});
}
installContentGuards();

renderSlides();
renderPicker();
showSlide(0);
</script>
</body>
</html>
