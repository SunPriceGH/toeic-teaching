listeningSets.forEach((set,idx)=>slides.push({kind:'set',set,label:`PART ${set.part} · QUESTIONS ${set.range}`,title:set.title,pageTitle:`P${set.part} · ${set.range}`}));
slides.push({kind:'summary',label:'TỔNG KẾT',title:'Hoàn tất ETS 2023 Test 6 · Part 3 + 4',pageTitle:'Tổng kết',html:`<div class="content-area"><div class="intro-box"><h3>Checklist khi dạy</h3><ul class="steps"><li>Cho học viên đọc câu hỏi trước và nói rõ họ đang chờ loại thông tin nào.</li><li>Nhấn GO từng lần để lộ đáp án, cụm cần nghe và paraphrase.</li><li>Với câu graphic, bắt buộc nói thành tiếng bước nối từ audio sang bảng/hình.</li><li>Sau mỗi nhóm 3 câu, phát lại các cụm trọng tâm bằng nút loa.</li></ul></div><div class="summary-count reveal"><span class="summary-pill">23 đoạn nghe</span><span class="summary-pill">69 clue mappings</span></div><button class="restart-btn" onclick="restartLesson()" type="button">LÀM LẠI TỪ ĐẦU</button><a class="home-btn" href="index.html">VỀ TRANG CHỦ</a></div>`});
function renderQuestion(q){return `<article class="question-card"><div class="question-top"><span class="question-no">Q${q.no}</span><span class="focus-pill">${escapeHtml(q.focus)}</span></div><div class="question-text">${escapeHtml(q.q)}</div><div class="answer-box reveal"><div class="answer-label">Đáp án</div><div class="answer-text">${escapeHtml(q.answer)}</div></div><div class="clue-box reveal"><div class="clue-label">Cụm cần nghe trong transcript</div>${q.clues.map(c=>`<div class="clue">${escapeHtml(c)}</div>`).join('')}</div><div class="map-box reveal"><span class="map-arrow">Đối chiếu:</span> ${escapeHtml(q.map)}</div></article>`;}
function renderSlides(){const mount=document.getElementById('slideMount');mount.innerHTML=slides.map((s,i)=>{if(s.kind==='set'){const set=s.set;return `<section class="slide" data-index="${i}"><span class="slide-label">${escapeHtml(s.label)}</span><h2>${escapeHtml(s.title)}</h2><div class="content-area"><div class="set-head"><div class="set-head-grid"><div><h3>Questions ${escapeHtml(set.range)}</h3><p class="context">${escapeHtml(set.context)}</p></div><div><span class="range-badge">${escapeHtml(set.range)}</span> <button class="audio-btn" type="button" onclick="speakSet(${i},this)" title="Đọc các cụm cần nghe">🔊</button></div></div></div>${graphicHtml(set.graphic)}<div class="question-grid">${set.questions.map(renderQuestion).join('')}</div></div></section>`;}return `<section class="slide" data-index="${i}"><span class="slide-label">${escapeHtml(s.label)}</span><h2>${escapeHtml(s.title)}</h2>${s.html}</section>`;}).join('');}
let currentSlide=0;let speakingBtn=null;
function showSlide(index){const all=[...document.querySelectorAll('.slide')];currentSlide=Math.max(0,Math.min(index,all.length-1));all.forEach((s,i)=>s.classList.toggle('active',i===currentSlide));document.getElementById('progressText').textContent=`${currentSlide+1} / ${all.length}`;document.getElementById('topLine').style.width=`${((currentSlide+1)/all.length)*100}%`;window.scrollTo({top:0,behavior:'smooth'});speechSynthesis.cancel();if(speakingBtn){speakingBtn.classList.remove('playing');speakingBtn=null}renderPagePicker();}
function goReveal(){const slide=document.querySelector('.slide.active');const next=[...slide.querySelectorAll('.reveal:not(.show)')][0];if(next)next.classList.add('show');else nextSlide();}
function revealAll(){document.querySelectorAll('.slide.active .reveal').forEach(el=>el.classList.add('show'));}
function nextSlide(){showSlide(currentSlide+1)}function prevSlide(){showSlide(currentSlide-1)}
function restartLesson(){document.querySelectorAll('.reveal').forEach(el=>el.classList.remove('show'));showSlide(0)}
function speakSet(slideIndex,btn){const s=slides[slideIndex];if(!s||s.kind!=='set')return;speechSynthesis.cancel();if(speakingBtn===btn&&btn.classList.contains('playing')){btn.classList.remove('playing');speakingBtn=null;return;}if(speakingBtn)speakingBtn.classList.remove('playing');speakingBtn=btn;btn.classList.add('playing');const text=s.set.questions.flatMap(q=>q.clues).join('. ');const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.88;u.onend=u.onerror=()=>{btn.classList.remove('playing');if(speakingBtn===btn)speakingBtn=null};speechSynthesis.speak(u)}
function openPagePicker(){document.getElementById('pagePicker').classList.add('show');document.body.style.overflow='hidden';renderPagePicker()}
function closePagePicker(e){if(e&&e.target!==document.getElementById('pagePicker'))return;document.getElementById('pagePicker').classList.remove('show');document.body.style.overflow=''}
function jumpToPage(i){closePagePicker();showSlide(i)}
function renderPagePicker(){const grid=document.getElementById('pagePickerGrid');if(!grid)return;grid.innerHTML=slides.map((s,i)=>`<button class="page-jump-btn ${i===currentSlide?'active':''}" onclick="jumpToPage(${i})" type="button"><span class="page-no">${i+1}</span><span class="page-title">${escapeHtml(s.pageTitle||s.title)}</span></button>`).join('')}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextSlide();if(e.key==='ArrowLeft')prevSlide();if(e.key===' '){e.preventDefault();goReveal()}if(e.key==='Escape')closePagePicker()});
document.addEventListener('contextmenu',e=>e.preventDefault());
renderSlides();showSlide(0);
</script>
</body>
</html>
